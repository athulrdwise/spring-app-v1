name: Deploy Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy Application
        run: |
          set -e

          PID_FILE="app.pid"

          echo "================================="
          echo "🚀 Starting Deployment"
          echo "================================="

          cd /DataVolume/Athul/project/ci-cd-deployment

          # Safely find JAR
          JAR_FILE=$(ls -t *.jar 2>/dev/null | head -n 1)

          if [ -z "$JAR_FILE" ]; then
            echo "❌ No JAR file found!"
            exit 1
          fi

          echo "📦 Using JAR: $JAR_FILE"

          # Stop old app safely
          echo "🛑 Stopping old app..."

          if [ -f "$PID_FILE" ]; then
              PID=$(cat $PID_FILE)

              if ps -p $PID > /dev/null 2>&1; then
                  kill $PID
                  echo "Waiting for process to stop..."
                  sleep 5
              else
                  echo "⚠️ Process not running"
              fi

              rm -f $PID_FILE
          else
              echo "ℹ️ No PID file found"
          fi

          # Start new app
          echo "▶️ Starting new app..."

          nohup java -jar "$JAR_FILE" > app.log 2>&1 &

          NEW_PID=$!
          echo $NEW_PID > $PID_FILE

          sleep 5

          # Verify app started
          if ps -p $NEW_PID > /dev/null 2>&1; then
              echo "✅ App started successfully (PID: $NEW_PID)"
          else
              echo "❌ App failed to start!"
              tail -n 50 app.log
              exit 1
          fi

          echo "================================="
          echo "🎉 Deployment Successful!"
          echo "================================="