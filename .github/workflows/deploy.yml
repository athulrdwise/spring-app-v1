name: Spring Boot Deployment with CI / CD

on:
  push:
    branches:
      - main

jobs: 
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
        
      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy JAR to Deployment Directory
        run: cp target/*.jar /DataVolume/Athul/project/ci-cd-deployment

      - name: Deploy Application
        run: |
          cd /DataVolume/Athul/project/ci-cd-deployment
          bash deployment.sh