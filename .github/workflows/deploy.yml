name: Spring Boot Deployment with CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: self-hosted

    env:
      DEPLOY_DIR: /DataVolume/Athul/project/ci-cd-deployment
      SERVICE_NAME: myapp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Copy JAR to deployment directory
        run: cp target/*.jar "$DEPLOY_DIR/"

      - name: Resolve latest JAR
        id: jar
        run: |
          JAR=$(ls -t "$DEPLOY_DIR"/*.jar 2>/dev/null | head -n 1)
          if [ -z "$JAR" ]; then
            echo "No JAR found in $DEPLOY_DIR"
            exit 1
          fi
          echo "path=$JAR" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$JAR")" >> "$GITHUB_OUTPUT"

      - name: Write systemd unit file
        run: |
          sudo tee /etc/systemd/system/${SERVICE_NAME}.service > /dev/null <<EOF
          [Unit]
          Description=Spring Boot - ${SERVICE_NAME}
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=${DEPLOY_DIR}
          ExecStart=/usr/bin/java -jar ${{ steps.jar.outputs.path }}
          StandardOutput=append:${DEPLOY_DIR}/app.log
          StandardError=append:${DEPLOY_DIR}/app.log
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Reload systemd and restart service
        run: |
          sudo systemctl daemon-reload
          sudo systemctl restart ${SERVICE_NAME}.service
          sudo systemctl enable ${SERVICE_NAME}.service

      - name: Verify service is running
        run: |
          echo "Waiting for service to stabilize..."
          for i in $(seq 1 15); do
            sleep 2
            STATUS=$(sudo systemctl is-active ${SERVICE_NAME}.service)
            if [ "$STATUS" = "active" ]; then
              echo "Service is active after $((i * 2))s"
              sudo systemctl status ${SERVICE_NAME}.service --no-pager
              exit 0
            fi
            echo "  [$i] Status: $STATUS"
          done
          echo "Service failed to start within 30s"
          sudo journalctl -u ${SERVICE_NAME}.service -n 50 --no-pager
          exit 1

      - name: Deployment summary
        if: success()
        run: |
          echo "================================="
          echo "Deployment Successful!"
          echo "  JAR     : ${{ steps.jar.outputs.name }}"
          echo "  Service : $SERVICE_NAME"
          echo "  Status  : $(sudo systemctl is-active $SERVICE_NAME)"
          echo "================================="